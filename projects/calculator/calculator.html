<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Calculator</h1>
    </header>
    <main>
        <div class="calculator">
            <div class="screen">
                
            </div>
            <div class="button-container">
                <button class="button button-top" id="power-button" value="power">&#x23FB;</button>
                <button class="button button-top" value="gt" disabled>GT</button>
                <button class="button button-top" value="positiveNegative">+/-</button>
                <button class="button button-top" id="ac-button" value="ac">AC</button>
                <button class="button button-top" id="ce-button" value="ce">CE</button>
                <button class="button" value="mrc" disabled>MRC</button>
                <button class="button" value="mMinus" disabled>M-</button>
                <button class="button" value="mPlus" disabled>M+</button>
                <button class="button" value="mu" disabled>MU</button>
                <button class="button" value="delete">&rarr;</button>
                <button class="button" value="7">7</button>
                <button class="button" value="8">8</button>
                <button class="button" value="9">9</button>
                <button class="button" value="percent">%</button>
                <button class="button" value="squareRoot">&radic;</button>
                <button class="button" value="4">4</button>
                <button class="button" value="5">5</button>
                <button class="button" value="6">6</button>
                <button class="button" value="multiply">&times;</button>
                <button class="button" value="divide">&divide;</button>
                <button class="button" value="1">1</button>
                <button class="button" value="2">2</button>
                <button class="button" value="3">3</button>
                <button class="button" id="plus-button" value="plus">+</button>
                <button class="button" value="minus">-</button>
                <button class="button" value="0">0</button>
                <button class="button" value="doubleZero">00</button>
                <button class="button" value="decimal">.</button>
                <button class="button" value="equals">=</button>
            </div>
        </div>
    </main>
    <footer>
        <p>© 2026 Bench Jemmel</p>
    </footer>
</body>
</html>
